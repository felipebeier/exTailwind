<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>${1:Título da Página}</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-white">
    <header class="p-4 bg-white shadow-md">
      <nav class="flex flex-col md:flex-row md:justify-between md:items-center">
        <div class="flex justify-between items-center">
          <a href="#" class="text-stone-700 font-bold text-xl">Pet&Style</a>
          <button id="menu-button" class="md:hidden p-2 border rounded">
            ☰
          </button>
        </div>

        <ul
          id="menu"
          class="hidden md:flex flex-col md:flex-row gap-4 mt-4 md:mt-0"
        >
          <li><a href="#" class="hover:text-amber-400">Home</a></li>
          <li><a href="#" class="hover:text-amber-400">Shop</a></li>
          <li><a href="#" class="hover:text-amber-400">Sobre nós</a></li>
          <li><a href="#" class="hover:text-amber-400">Contato</a></li>
        </ul>
      </nav>
    </header>
    <main id="main-content" tabindex="-1">
      <section id="hero" class="grid-cols-2">
        <div
          id="container"
          class="bg-olive-200 grid grid-cols-1 md:grid-cols-2 gap-x-8 items-center max-w-5xl mx-auto p-8 rounded-2xl"
        >
          <div class="space-y-6">
            <h1 class="text-5xl font-extrabold text-stone-700 leading-tight">
              Estilo e conforto para o seu pet
            </h1>
            <h2 class="text-xl text-stone-600">
              Conheça a coleção exclusiva da Pet&Style
            </h2>
            <button
              class="bg-amber-400 hover:bg-amber-500 px-8 py-3 rounded-full font-bold transition text-lg"
            >
              Conhecer Agora!
            </button>
          </div>
          <div class="flex justify-center md:justify-end">
            <img
              src="img/herogold3nobg.png"
              alt="Pet estiloso"
              class="max-h-96 md:max-h-[500px] object-contain"
            />
          </div>
        </div>
      </section>
      <section id="produtos" class="py-16 px-6 max-w-6xl mx-auto">
        <h2
          class="text-3xl font-bold text-stone-700 mb-10 text-center md:text-left pt-10"
        >
          Produtos em destaque
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
          <div
            class="bg-white p-4 rounded-2xl shadow-md border border-stone-100 flex flex-col"
          >
            <div
              class="bg-stone-50 rounded-xl mb-4 flex justify-center items-center aspect-square p-4"
            >
              <img
                src="https://images.unsplash.com/photo-1541599540903-216a46ca1dfa?q=80&w=300"
                alt="Caminha"
                class="max-h-full object-contain"
              />
            </div>

            <div class="flex-grow">
              <h3 class="font-bold text-stone-800 text-lg">Caminha Soft</h3>
              <p class="text-sm text-stone-500 mt-1">
                Conforto máximo para o sono do seu pet.
              </p>
            </div>

            <div class="mt-4">
              <span class="text-xl font-black text-stone-900">R$ 189,90</span>
              <button
                class="w-full mt-3 bg-orange-500 text-white py-2 rounded-xl font-bold hover:bg-orange-600 transition shadow-lg shadow-orange-100"
              >
                COMPRAR
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const btn = document.getElementById("menu-button");
      const menu = document.getElementById("menu");

      btn.addEventListener("click", () => {
        menu.classList.toggle("hidden");
        menu.classList.toggle("flex");
      });
    </script>

    <footer>
      <!-- <p>&copy; 2026 - Todos os direitos reservados.</p> -->
    </footer>
  </body>
</html>
