<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <section id="produtos" class="py-16 px-6 max-w-6xl mx-auto">
      <h2
        class="text-3xl font-bold text-stone-800 mb-10 text-center md:text-left"
      >
        Produtos em Destaque
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
        <div
          class="bg-white p-5 rounded-3xl shadow-xl border border-stone-100 flex flex-col hover:scale-105 transition-transform duration-300"
        >
          <div
            class="bg-stone-50 rounded-2xl mb-4 p-4 flex justify-center items-center aspect-square"
          >
            <img
              src="https://images.unsplash.com/photo-1541599540903-216a46ca1dfa?q=80&w=300"
              alt="Caminha"
              class="max-h-full object-contain"
            />
          </div>
          <h3 class="text-lg font-bold text-stone-800 leading-snug">
            Caminha Soft Premium
          </h3>
          <p class="text-sm text-stone-500 mt-2">
            Ultra conforto para o sono do seu melhor amigo.
          </p>
          <div class="mt-4 flex flex-col">
            <span class="text-xl font-black text-stone-900">R$ 189,90</span>
            <button
              class="mt-4 bg-orange-500 text-white py-3 rounded-2xl font-bold hover:bg-orange-600 shadow-md shadow-orange-200 transition-all"
            >
              ADICIONAR
            </button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
